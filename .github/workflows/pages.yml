name: GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    name: Build WebGL demos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten 3.1.64
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.64"
          actions-cache-folder: .emsdk-cache

      - name: Create site directory
        run: mkdir -p site

      # Inject -s MIN_WEBGL_VERSION=2 at runtime so the GLSL ES 3.00 shader parser
      # is used, without modifying any source files.
      - name: Build Chapter2/2-OpenGLES3_Primitives-Modern
        continue-on-error: true
        working-directory: Chapter2/2-OpenGLES3_Primitives-Modern
        run: |
          sed 's/-s USE_WEBGL2=1 \\/-s USE_WEBGL2=1 \\\n    -s MIN_WEBGL_VERSION=2 \\/' build_web.sh | bash
          mkdir -p ../../site/Chapter2/2-OpenGLES3_Primitives-Modern
          cp -r web/. ../../site/Chapter2/2-OpenGLES3_Primitives-Modern/

      - name: Build Assignment-1
        continue-on-error: true
        working-directory: Assignment-1
        run: |
          bash build_web.sh
          mkdir -p ../site/Assignment-1
          cp -r web/. ../site/Assignment-1/
      
      - name: Build Assignment-2
        continue-on-error: true
        working-directory: Assignment-2
        run: |
          bash build_web.sh
          mkdir -p ../site/Assignment-2
          cp -r web/. ../site/Assignment-2/
 
      - name: Generate index.html
        run: cp .github/site/index.html site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
