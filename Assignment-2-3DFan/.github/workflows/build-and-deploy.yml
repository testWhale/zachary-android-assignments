name: Build & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------
  # Desktop (Windows / GLFW + GLEW + GLM via CMake FetchContent)
  # ---------------------------------------------------------------------
  build-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build_desktop -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build_desktop --config Debug

  # ---------------------------------------------------------------------
  # Android (debug APK via Gradle; setup-gradle installs Gradle directly
  # so this doesn't depend on gradlew/gradlew.bat being committed)
  # ---------------------------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

  # ---------------------------------------------------------------------
  # Web (Emscripten). Always builds; artifact only gets deployed to Pages
  # by the deploy-pages job below, and only on push to main.
  # ---------------------------------------------------------------------
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: emscripten-core/setup-emsdk@v15

      - name: Build web target
        run: bash build_web.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  # ---------------------------------------------------------------------
  # Deploy the web build to GitHub Pages - push to main only, not PRs.
  # Requires Settings -> Pages -> Source = "GitHub Actions" once.
  # ---------------------------------------------------------------------
  deploy-pages:
    needs: build-web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
